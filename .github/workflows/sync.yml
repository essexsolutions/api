name: Sync contacts to D1

# We re-run the full Airtable->D1 sync on a schedule rather than wiring up
# Airtable webhooks (which require registration + refresh via the API). The
# dataset is small, so a full refresh is cheap. See the api README for how to
# switch to real-time Airtable webhooks later if you want instant updates.

on:
  schedule:
    - cron: "*/5 * * * *" # ~every 5 min (GitHub's practical floor; best-effort, may delay under load)
  workflow_dispatch: {} # lets you run it on demand from the Actions tab

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger /api/admin/sync
        run: |
          resp=$(curl -sS -X POST "https://essexsolutions.webflow.io/api/admin/sync" \
            -H "x-admin-key: ${{ secrets.ADMIN_SYNC_KEY }}" \
            -H "Content-Type: application/json")
          echo "Response: $resp"
          echo "$resp" | grep -q '"ok":true' || { echo "::error::Sync failed"; exit 1; }
